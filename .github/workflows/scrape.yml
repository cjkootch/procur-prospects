name: Scrape

on:
  workflow_dispatch:
    inputs:
      sources:
        description: "Space-separated source keys (or blank = all Jamaica)"
        required: false
        default: ""
  schedule:
    # Weekly Sunday 02:00 UTC
    - cron: "0 2 * * 0"

concurrency:
  group: scrape
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run scrapers
        env:
          SOURCES: ${{ github.event.inputs.sources }}
        run: |
          mkdir -p data/output
          if [ -n "$SOURCES" ]; then
            python -m scrapers.run $SOURCES --merge
          else
            python -m scrapers.run --merge
          fi

      - name: Summarize
        run: |
          python - <<'PY'
          import csv, glob, os
          total = 0
          for f in glob.glob('data/output/*.csv'):
              with open(f) as fh:
                  n = sum(1 for _ in csv.reader(fh)) - 1
              print(f"{os.path.basename(f)}: {n} rows")
              total += n
          print(f"sum across files: {total}")
          PY

      - name: Commit output CSVs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f data/output/*.csv
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "Scraper output from run ${{ github.run_number }}"
            for i in 1 2 3 4; do
              if git push; then break; fi
              sleep $((2 ** i))
            done
          fi
